<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="author" content="Aya Alnabelsi" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koffiemachine</title>
    <link href="styles/style.css" rel="stylesheet" />
  </head>

  <body>
    <main>
      <header>
        <h1 class="liquid-title">
          <svg viewBox="0 0 100 20">
            <defs>
              <!--Kleur vloeibare koffie-->
              <linearGradient id="gradient" gradientTransform="rotate(90)">
                <stop offset="0%" stop-color="#3b2416" />
                <stop offset="70%" stop-color="#8b5e3c" />
              </linearGradient>

              <!--Pattern gebruiken als vulling van de tekst-->
              <pattern
                id="wave"
                x="0"
                y="-0.5"
                width="100%"
                height="100%"
                patternUnits="userSpaceOnUse"
              >
                <!-- patternUnits="userSpaceOnUse Zorgt dat het wave patroon de echte SVG ruimte gebruikt
                  Daardoor beweegt de golf horizontaal over de tekst en 
                  wordt hij niet vervormd door de vorm van de letters-->

                <!--Vorm van de golf -->
                <path
                  d="M-40 9 Q-30 7 -20 9 T0 9 T20 9 T40 9 T60 9 T80 9 T100 9 T120 9 V20 H-40z"
                  fill="url(#gradient)"
                >
                  <animateTransform
                    attributeName="transform"
                    dur="1.5s"
                    type="translate"
                    from="0,0"
                    to="40,0"
                    repeatCount="indefinite"
                  />
                </path>
              </pattern>
            </defs>

            <!--layer stack techniek hiermee de zelfde tekst 2x tekenen boven elkaar -->
            <!--Transparante laag-->
            <text
              text-anchor="middle"
              x="50"
              y="15"
              font-size="17"
              fill="#ffff"
              fill-opacity="0.35"
            >
              Coffee
            </text>

            <!--Geanimeerde laag-->
            <text
              text-anchor="middle"
              x="50"
              y="15"
              font-size="17"
              fill="url(#wave)"
            >
              Coffee
            </text>
          </svg>
        </h1>

        <!--Paneel-->
        <div>
          <ul>
            <label>
              <input type="checkbox" value="espresso" name="button" />
              Espresso
            </label>

            <label>
              <input type="checkbox" value="cappuccino" name="button" />
              Cappuccino
            </label>
            <label>
              <input type="checkbox" value="latte" name="button" />
              Latte
            </label>
          </ul>
        </div>
        <!--https://cdnjs.cloudflare.com/ajax/libs/jquery/3.1.1/jquery.min.js-->
      </header>
  

      <section>
        <label>
          <input type="checkbox" value="Stop" name="button" />
          Stop
        </label>
        <div></div>
        <div></div>
      </section>

      <footer>
        <!--Extra styling-->
        <div></div>
        <!--Lekbak-->
        <div></div>
      </footer>

    
      <label>
        <input type="checkbox" value="aan" />
        AAN/UIT
      </label>

      <!--Kopje-->
      <span></span>

      <koffie></koffie>
    </main>
  </body>
</html>
